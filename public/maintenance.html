<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance - NeuroNerds Quiz</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .animation {
      width: 300px;
      height: 300px;
      margin: 0 auto 2rem;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }
    p {
      font-size: 1.25rem;
      color: #9CA3AF;
      margin-bottom: 2rem;
    }
    .refresh-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .refresh-btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="animation">
      <iframe 
        src="https://lottie.host/embed/fafc6dbc-d742-4f7a-b475-d4e9e4483057/rmRAaaC8hp.json"
        style="width: 100%; height: 100%; border: 0;"
        title="Maintenance Animation"
      ></iframe>
    </div>
    <h1>🔧 Maintenance Mode</h1>
    <p>We're updating the system. Please check back in a few minutes.</p>
    <button class="refresh-btn" onclick="location.reload()">🔄 Refresh Page</button>
  </div>
</body>
</html>
